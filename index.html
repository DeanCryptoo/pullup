    <style>
        :root {
            /* ORIGINALES PULLUP GELB & SCHWARZ */
            --color-accent: #d6d01f; 
            --color-black: #050505;
        }

        body, a, button, input, textarea, select {
            font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
            font-weight: 800;
        }

        html, body {
            background-color: var(--color-black);
            margin: 0;
            padding: 0;
            overflow-x: clip; 
            width: 100%;
            max-width: 100vw;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        .text-accent { color: var(--color-accent); }
        .bg-accent { background-color: var(--color-accent); }
        .border-accent { border-color: var(--color-accent); }
        .decoration-accent { text-decoration-color: var(--color-accent); }
        .selection-accent::selection { background-color: var(--color-accent); color: black; }

        @media (hover: hover) and (pointer: fine) {
            body, a, button, input, textarea, select {
                cursor: none !important;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-accent);
        }

        .text-stroke-white {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
        }
        .text-stroke-black {
            -webkit-text-stroke: 1px black;
        }
        
        .text-outline-transparent {
            color: transparent;
            -webkit-text-stroke: 2px rgba(255,255,255,0.15);
        }

        .preserve-3d {
            transform-style: preserve-3d;
        }
        .perspective-container {
            perspective: 1500px;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        .gpu-accelerated {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
            will-change: transform;
        }
        
        .receipt-edge {
            background: linear-gradient(-45deg, transparent 16px, #f3f4f6 0), linear-gradient(45deg, transparent 16px, #f3f4f6 0);
            background-repeat: repeat-x;
            background-position: left bottom;
            background-size: 32px 32px;
            content: "";
            display: block;
            width: 100%;
            height: 32px;
        }

        /* Utility für vertikalen Text im Line-Up Accordion */
        .writing-vertical {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }
    </style>

        const CustomCursor = () => {
            const mouseX = useMotionValue(0);
            const mouseY = useMotionValue(0);
            const [isDesktop, setIsDesktop] = useState(false);
            const smoothX = useSpring(mouseX, { stiffness: 1000, damping: 50 });
            const smoothY = useSpring(mouseY, { stiffness: 1000, damping: 50 });

            useEffect(() => {
                if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) setIsDesktop(true);
                const handleMouseMove = (e) => { mouseX.set(e.clientX); mouseY.set(e.clientY); };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, [mouseX, mouseY]);

            if (!isDesktop) return null;

            return (
                <motion.div
                    className="fixed top-0 left-0 w-6 h-6 rounded-full pointer-events-none z-[9999] mix-blend-difference will-change-transform"
                    style={{ x: smoothX, y: smoothY, translateX: "-50%", translateY: "-50%", backgroundColor: 'var(--color-accent)' }}
                />
            );
        };

        const DecryptedText = ({ text, className, revealDelay = 0, animateOnHover = false }) => {
            const [displayText, setDisplayText] = useState(text);
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%^&*";
            
            const scramble = useCallback(() => {
                let iteration = 0;
                let interval = setInterval(() => {
                    setDisplayText(prev => text.split("").map((letter, index) => {
                        if (index < iteration) return text[index];
                        return chars[Math.floor(Math.random() * chars.length)];
                    }).join(""));
                    if (iteration >= text.length) clearInterval(interval);
                    iteration += 1 / 3; 
                }, 30);
                return interval;
            }, [text]);

            useEffect(() => {
                const timeout = setTimeout(() => scramble(), revealDelay);
                return () => clearTimeout(timeout);
            }, [revealDelay, scramble]);

            return <span className={className} onMouseEnter={() => animateOnHover && scramble()}>{displayText}</span>;
        };

        const MagneticButton = ({ children, className, onClick }) => {
            const ref = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            
            const handleMouse = (e) => {
                const { clientX, clientY } = e;
                const { height, width, left, top } = ref.current.getBoundingClientRect();
                const middleX = clientX - (left + width / 2);
                const middleY = clientY - (top + height / 2);
                setPosition({ x: middleX * 0.2, y: middleY * 0.2 });
            };

            const reset = () => setPosition({ x: 0, y: 0 });
            const { x, y } = position;

            return (
                <motion.button ref={ref} className={className} onClick={onClick} animate={{ x, y }} transition={{ type: "spring", stiffness: 150, damping: 15, mass: 0.1 }} onMouseMove={handleMouse} onMouseLeave={reset}>
                    {children}
                </motion.button>
            );
        };

        const Countdown = ({ targetDate }) => {
            const [time, setTime] = useState("00:00:00:00");
            useEffect(() => {
                const target = new Date(targetDate).getTime();
                const updateTimer = () => {
                    const now = new Date().getTime();
                    const diff = target - now;
                    if (diff <= 0) return setTime("LIVE NOW");
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    setTime(`${d}d ${h}h ${m}m ${s}s`);
                };
                updateTimer();
                const interval = setInterval(updateTimer, 1000);
                return () => clearInterval(interval);
            }, [targetDate]);
            return <span className="font-mono text-accent text-sm md:text-base font-bold tracking-widest">{time}</span>;
        };

                    )}

        /* ------------------------------------------------------------------------------------------------ */

        // Das neue Künstler-Karussell-Komponente (subtil im Hintergrund)
        const ArtistCarousel = ({ artists, className }) => {
            const [index, setIndex] = useState(0);

                                        <a href={SOCIALS.tiktok} onClick={(e) => { e.preventDefault(); onLinkClick(SOCIALS.tiktok, true); }} className="hover:text-white transition-colors hover:scale-110 duration-200 cursor-none"><svg className="w-8 h-8 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-4.245V2h-3.445v13.672a2.896 2.896 0 0 1-5.201 1.743l-.002-.001.002.001a2.895 2.895 0 0 1 3.183-4.51v-3.5a6.329 6.329 0 0 0-5.394 10.692 6.33 6.33 0 0 0 10.857-4.424V8.687a8.182 8.182 0 0 0 4.773 1.526V6.79a4.831 4.831 0 0 1-1.003-.104z"/></svg></a>
                                        <a href={SOCIALS.youtube} onClick={(e) => { e.preventDefault(); onLinkClick(SOCIALS.youtube, true); }} className="hover:text-white transition-colors hover:scale-110 duration-200 cursor-none"><Youtube className="w-8 h-8" /></a>
                                        <a href={SOCIALS.whatsapp} onClick={(e) => { e.preventDefault(); onLinkClick(SOCIALS.whatsapp, true); }} className="hover:text-white transition-colors hover:scale-110 duration-200 cursor-none"><svg className="w-8 h-8 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg></a>

                        <div className="mt-16 md:mt-24">
                            <h2 className="text-[15vw] md:text-[18vw] leading-[0.8] font-black tracking-tighter text-center md:text-left select-none pointer-events-none opacity-90">PULLUP</h2>
                            <div className="flex flex-row justify-between items-center mt-8 text-[10px] md:text-sm uppercase font-bold tracking-widest w-full">
                                <span className="shrink-0">© 2025 PULLUP ORG.</span>
                                <img src="PoweredbyWestroomz.png" alt="Powered by Westroomz" className="h-16 md:h-32 w-auto object-contain mx-2 transition-opacity" />
                                <span className="shrink-0">EST. 2019</span>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [isTransitioning, setIsTransitioning] = useState(false);

            const handleLinkClick = (href, newTab) => {
                setIsTransitioning(true);
                setTimeout(() => {
                    setIsTransitioning(false);
                    if (newTab) {
                        window.open(href, '_blank');
                    } else {
                        if (href.startsWith('#')) {
                            const element = document.querySelector(href);
                            if (element) {
                                element.scrollIntoView({ behavior: 'smooth' });
                            }
                        } else {
                            window.location.href = href;
                        }
                    }
                }, 400); 
            };

            return (
                <main className="w-full bg-black min-h-screen overflow-x-clip">
                    <CustomCursor />
                    <AnimatePresence>
                        {isTransitioning && <GlitchTransition isActive={isTransitioning} />}
                    </AnimatePresence>
                    <AnimatePresence mode='wait'>
                        {loading && <Preloader setLoading={setLoading} />}
                    </AnimatePresence>
                    
                    {!loading && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1 }}>
                            <GlobalBackground />
                            <Header onLinkClick={handleLinkClick} />
                            
                            <Hero />
                            <Marquee />
                            <Events onLinkClick={handleLinkClick} />
                            <Infos />
                            <News onLinkClick={handleLinkClick} />
                            <Story />
                            <GalleryTicker />
                            <Merch onLinkClick={handleLinkClick} />
                            <Footer onLinkClick={handleLinkClick} />
                        </motion.div>
                    )}
                </main>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
